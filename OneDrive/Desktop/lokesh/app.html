<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }
        #score-container {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        #game-board {
            width: 400px;
            height: 400px;
            background-color: #222;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            position: relative;
        }
        .snake-part {
            width: 18px;
            height: 18px;
            background-color: #00ff66;
            border: 1px solid #111;
            position: absolute;
            box-sizing: border-box;
            border-radius: 4px;
        }
        .snake-head {
            background-color: #00cc52;
        }
        #food {
            width: 18px;
            height: 18px;
            background-color: #ff3366;
            position: absolute;
            border-radius: 50%;
        }
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #game-over-screen h2 {
            color: #ff3366;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }
        #restart-btn {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #00ff66;
            color: #111;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #restart-btn:hover {
            background-color: #00cc52;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score-container">Score: <span id="score">0</span></div>

    <div id="game-board">
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <button id="restart-btn" onclick="resetGame()">Play Again</button>
        </div>
        <div id="food"></div>
    </div>

    <script>
        const board = document.getElementById("game-board");
        const scoreDisplay = document.getElementById("score");
        const gameOverScreen = document.getElementById("game-over-screen");
        const foodElement = document.getElementById("food");

        const blockSize = 20;
        const totalRows = 20;
        const totalCols = 20;

        let snakeX = blockSize * 5;
        let snakeY = blockSize * 5;
        let snakeBody = [];

        let velocityX = 0;
        let velocityY = 0;

        let foodX;
        let foodY;

        let score = 0;
        let gameInterval;
        let gameOver = false;

        // Start game logic
        window.onload = function() {
            placeFood();
            document.addEventListener("keydown", changeDirection);
            gameInterval = setInterval(update, 100);
        }

        // Main game loop logic
        function update() {
            if (gameOver) return;

            // Move the snake
            snakeX += velocityX * blockSize;
            snakeY += velocityY * blockSize;

            // Wall collision logic
            if (snakeX < 0 || snakeX >= totalCols * blockSize || snakeY < 0 || snakeY >= totalRows * blockSize) {
                endGame();
                return;
            }

            // Snake body collision logic
            for (let i = 0; i < snakeBody.length; i++) {
                if (snakeX === snakeBody[i][0] && snakeY === snakeBody[i][1]) {
                    endGame();
                    return;
                }
            }

            // Check if food is eaten
            if (snakeX === foodX && snakeY === foodY) {
                snakeBody.push([foodX, foodY]);
                score += 10;
                scoreDisplay.textContent = score;
                placeFood();
            }

            // Follow the head configuration
            for (let i = snakeBody.length - 1; i > 0; i--) {
                snakeBody[i] = snakeBody[i - 1];
            }
            if (snakeBody.length > 0) {
                snakeBody[0] = [snakeX, snakeY];
            }

            render();
        }

        // Render objects on the board
        function render() {
            // Remove old snake elements
            const oldSegments = document.querySelectorAll(".snake-part");
            oldSegments.forEach(segment => segment.remove());

            // Draw head
            const headElement = document.createElement("div");
            headElement.style.left = `${snakeX}px`;
            headElement.style.top = `${snakeY}px`;
            headElement.classList.add("snake-part", "snake-head");
            board.appendChild(headElement);

            // Draw body segments
            for (let i = 1; i < snakeBody.length; i++) {
                const bodyElement = document.createElement("div");
                bodyElement.style.left = `${snakeBody[i][0]}px`;
                bodyElement.style.top = `${snakeBody[i][1]}px`;
                bodyElement.classList.add("snake-part");
                board.appendChild(bodyElement);
            }

            // Draw food
            foodElement.style.left = `${foodX}px`;
            foodElement.style.top = `${foodY}px`;
        }

        // Keyboard controls configuration
        function changeDirection(e) {
            if (e.code === "ArrowUp" && velocityY !== 1) {
                velocityX = 0;
                velocityY = -1;
            } else if (e.code === "ArrowDown" && velocityY !== -1) {
                velocityX = 0;
                velocityY = 1;
            } else if (e.code === "ArrowLeft" && velocityX !== 1) {
                velocityX = -1;
                velocityY = 0;
            } else if (e.code === "ArrowRight" && velocityX !== -1) {
                velocityX = 1;
                velocityY = 0;
            }
        }

        // Randomize food placement
        function placeFood() {
            foodX = Math.floor(Math.random() * totalCols) * blockSize;
            foodY = Math.floor(Math.random() * totalRows) * blockSize;
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameInterval);
            gameOverScreen.style.display = "flex";
        }

        function resetGame() {
            snakeX = blockSize * 5;
            snakeY = blockSize * 5;
            snakeBody = [];
            velocityX = 0;
            velocityY = 0;
            score = 0;
            gameOver = false;
            scoreDisplay.textContent = score;
            gameOverScreen.style.display = "none";
            placeFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(update, 100);
        }
    </script>
</body>
</html>
