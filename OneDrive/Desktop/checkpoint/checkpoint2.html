<!DOCTYPE html>

<html>

<head>

<title>Contact Form</title>

</head>

<body>

<h1>Contact Me</h1>

<form>

<label>Full Name</label>

<br>

<input
type="text"
placeholder="Enter your name"
required>

<br><br>

<label>Email</label>

<br>

<input
type="email"
placeholder="Enter Email"
required>

<br><br>

<label>Phone</label>

<br>

<input
type="tel"
placeholder="9876543210">

<br><br>

<label>Message</label>

<br>

<textarea
rows="5"
cols="30"
placeholder="Write your message">

</textarea>

<br><br>

<button type="submit">

Send Message

</button>

<button type="reset">

Clear

</button>

</form>

</body>

</html>
